name: Nightly Security

on:
  schedule:
    - cron: '40 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  preflight:
    name: Workflow preflight
    runs-on: ubuntu-latest
    outputs:
      solution-exists: ${{ steps.detect.outputs.solution-exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect solution scaffold
        id: detect
        shell: bash
        run: |
          if [[ -f './HoneyDrunk.Observe.slnx' ]]; then
            echo 'solution-exists=true' >> "$GITHUB_OUTPUT"
          else
            echo 'solution-exists=false' >> "$GITHUB_OUTPUT"
            echo 'No ./HoneyDrunk.Observe.slnx found yet; skipping scheduled .NET security scan until the repo scaffold lands.' >> "$GITHUB_STEP_SUMMARY"
          fi

  nightly-security:
    name: Nightly Security
    needs: preflight
    if: needs.preflight.outputs.solution-exists == 'true'
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/nightly-security.yml@main
    with:
      dotnet-version: '10.0.x'
      runs-on: 'ubuntu-latest'
      working-directory: '.'
      project-path: './HoneyDrunk.Observe.slnx'
      enable-sast: true
      enable-iac-scan: true
      enable-secret-scan: true
      create-issues: true
      actions-ref: 'main'
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
