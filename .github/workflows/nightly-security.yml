name: Nightly Security

on:
  schedule:
    - cron: '40 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  preflight:
    name: Workflow preflight
    permissions:
      contents: read
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/job-solution-preflight.yml@main
    with:
      runs-on: 'ubuntu-latest'
      project-path: './HoneyDrunk.Observe.slnx'
      missing-message: 'No ./HoneyDrunk.Observe.slnx found yet; skipping scheduled .NET security scan until the repo scaffold lands.'

  nightly-security:
    name: Nightly Security
    needs: preflight
    if: needs.preflight.outputs.project-exists == 'true'
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/nightly-security.yml@main
    with:
      dotnet-version: '10.0.x'
      runs-on: 'ubuntu-latest'
      working-directory: '.'
      project-path: './HoneyDrunk.Observe.slnx'
      enable-sast: true
      enable-iac-scan: true
      enable-secret-scan: true
      create-issues: true
      actions-ref: 'main'
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
