name: Weekly Dependencies

on:
  schedule:
    - cron: '40 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  preflight:
    name: Workflow preflight
    runs-on: ubuntu-latest
    outputs:
      solution-exists: ${{ steps.detect.outputs.solution-exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect solution scaffold
        id: detect
        shell: bash
        run: |
          if [[ -f './HoneyDrunk.Observe.slnx' ]]; then
            echo 'solution-exists=true' >> "$GITHUB_OUTPUT"
          else
            echo 'solution-exists=false' >> "$GITHUB_OUTPUT"
            echo 'No ./HoneyDrunk.Observe.slnx found yet; skipping scheduled .NET dependency scan until the repo scaffold lands.' >> "$GITHUB_STEP_SUMMARY"
          fi

  weekly-deps:
    name: Weekly Dependencies
    needs: preflight
    if: needs.preflight.outputs.solution-exists == 'true'
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/nightly-deps.yml@main
    with:
      dotnet-version: '10.0.x'
      runs-on: 'ubuntu-latest'
      working-directory: '.'
      project-path: './HoneyDrunk.Observe.slnx'
      check-dotnet-deps: true
      create-update-prs: true
      actions-ref: 'main'
    secrets:
      github-token: ${{ secrets.HIVE_FIELD_MIRROR_TOKEN }}
