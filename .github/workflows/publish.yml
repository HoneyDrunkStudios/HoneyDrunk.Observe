name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix, for example 0.1.0)'
        required: true
        type: string

permissions: {}

jobs:
  preflight:
    name: Workflow preflight
    permissions:
      contents: read
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/job-solution-preflight.yml@main
    with:
      runs-on: 'ubuntu-latest'
      project-path: './HoneyDrunk.Observe.slnx'
      missing-message: 'No ./HoneyDrunk.Observe.slnx found yet; skipping publish until the repo scaffold lands.'

  prepare:
    name: Prepare Release
    needs: preflight
    if: needs.preflight.outputs['project-exists'] == 'true'
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
    steps:
      - name: Determine version
        id: version
        shell: bash
        env:
          WORKFLOW_DISPATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "${{ github.event_name }}" == 'workflow_dispatch' ]]; then
            VERSION="$WORKFLOW_DISPATCH_VERSION"
            VERSION_TAG="v${VERSION}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            VERSION_TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$VERSION" =~ ^(0|[1-9][0-9]*)[.](0|[1-9][0-9]*)[.](0|[1-9][0-9]*)(-((0|[1-9][0-9]*)|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)([.]((0|[1-9][0-9]*)|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*))*)?$ ]]; then
            echo "::error::Version must be a NuGet package version without build metadata (for example 1.2.3 or 1.2.3-preview.1)."
            exit 1
          fi
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
          printf 'version_tag=%s\n' "$VERSION_TAG" >> "$GITHUB_OUTPUT"

  publish:
    name: Build, Pack, and Publish
    needs: [preflight, prepare]
    if: needs.preflight.outputs['project-exists'] == 'true'
    permissions:
      contents: write
      packages: write
      id-token: write
      security-events: write
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/release.yml@main
    with:
      dotnet-version: '10.0.x'
      configuration: 'Release'
      runs-on: 'ubuntu-latest'
      working-directory: '.'
      project-path: './HoneyDrunk.Observe.slnx'
      package-version: ${{ needs.prepare.outputs.version }}
      enable-nuget-publish: true
      nuget-source: 'https://api.nuget.org/v3/index.json'
      create-github-release: true
      github-release-tag: ${{ needs.prepare.outputs.version_tag }}
      release-product-name: HoneyDrunk.Observe
      release-nuget-packages: |
        HoneyDrunk.Observe.Abstractions
      release-docs-url: 'https://github.com/HoneyDrunkStudios/HoneyDrunk.Observe#readme'
      actions-ref: 'main'
    secrets:
      nuget-api-key: ${{ secrets.NUGET_API_KEY }}
