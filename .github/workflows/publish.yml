name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix, for example 0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  preflight:
    name: Workflow preflight
    permissions:
      contents: read
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/job-solution-preflight.yml@main
    with:
      runs-on: 'ubuntu-latest'
      project-path: './HoneyDrunk.Observe.slnx'
      missing-message: 'No ./HoneyDrunk.Observe.slnx found yet; skipping publish until the repo scaffold lands.'

  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == 'workflow_dispatch' ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version must be SemVer-like (for example 1.2.3 or 1.2.3-preview.1): $VERSION"
            exit 1
          fi
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

  publish:
    name: Build, Pack, and Publish
    needs: [preflight, prepare]
    if: needs.preflight.outputs.project-exists == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/release.yml@main
    with:
      dotnet-version: '10.0.x'
      configuration: 'Release'
      runs-on: 'ubuntu-latest'
      working-directory: '.'
      project-path: './HoneyDrunk.Observe.slnx'
      package-version: ${{ needs.prepare.outputs.version }}
      enable-nuget-publish: true
      nuget-source: 'https://api.nuget.org/v3/index.json'
      actions-ref: 'main'
    secrets:
      nuget-api-key: ${{ secrets.NUGET_API_KEY }}
